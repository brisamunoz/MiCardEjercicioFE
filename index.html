<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/miCard/css/style.css" />
    <title>Card de Producto</title>
  </head>
  <body>
    <!--PRIMERA CARD-->
    <div class="contenedorPadre">
      <!--Imagen-->
      <div class="contenedorImg">
        <!--Sale y guardar-->
        <span class="sale">Sale</span> <button class="guardar">❤</button>
      </div>
      <!--Texto imagen-->
      <div class="contenedorTexto">
        <h2>Set de Té</h2>
        <p class="descripcion">
          Set de tetera con 2 tazas de ceramica a juego.
        </p>
        <!--Precio-->
        <span class="precioActual">$990</span>
        <span class="precioOriginal">$1200</span>
      </div>
      <!--Botones talle y carrito-->
      <div>
        <select class="color">
          <option>Color</option>
          <option>Rosa</option>
          <option>Celeste</option>
          <option>Violeta</option>
        </select>
        <button class="agregar">Agregar 🛒</button>
      </div>
    </div>

    <!--SEGUNDA CARD-->
    <div class="contenedorPadre">
      <!--Imagen-->
      <div class="contenedorImg2">
        <!--Sale y guardar-->
        <span class="nuevo">New</span><span class="guardar">❤</span>
      </div>
      <!--Texto imagen-->
      <div class="contenedorTexto">
        <h2>Maceta Sonriente</h2>
        <p class="descripcion">Maceta ceramica rosa, varios tamaños.</p>
        <!--Precio-->
        <span class="precioActual">$350</span>
      </div>
      <!--Botones talle y carrito-->
      <div>
        <select class="color">
          <option>Tamaño</option>
          <option>Mini</option>
          <option>Pequeña</option>
          <option>Mediana</option>
        </select>
        <button class="agregar">Agregar 🛒</button>
      </div>
    </div>
  </body>
</html>
